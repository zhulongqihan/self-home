# 博客 + Agent HTTPS 反向代理（与 api 子域名共用同一张证书）
# 证书路径：/etc/nginx/ssl/api.cyruszhang.online/{fullchain.pem, privkey.pem}
# 反代到：博客 Docker nginx (本机 80 端口) - 博客内部按 server_name 分流到博客/agent

# ===== 共用 SSL 设置（命名 location 复用）=====
# 通用 SSL 参数（每个 server 块单独写避免冲突）

# ===== 博客根域名 + www + blog =====
server {
    listen 443 ssl http2;
    server_name cyruszhang.online www.cyruszhang.online blog.cyruszhang.online;

    ssl_certificate     /etc/nginx/ssl/api.cyruszhang.online/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/api.cyruszhang.online/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    access_log /var/log/nginx/blog.https.access.log;
    error_log  /var/log/nginx/blog.https.error.log warn;

    client_max_body_size 50m;

    # 反代到博客 Docker nginx（监听 80）
    location / {
        proxy_pass http://127.0.0.1:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;

        # WebSocket 支持（博客 /ws 路径）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 60s;
    }
}

# ===== Agent 子域名 =====
server {
    listen 443 ssl http2;
    server_name agent.cyruszhang.online;

    ssl_certificate     /etc/nginx/ssl/api.cyruszhang.online/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/api.cyruszhang.online/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    access_log /var/log/nginx/agent.https.access.log;
    error_log  /var/log/nginx/agent.https.error.log warn;

    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Agent 项目可能用 SSE/WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}