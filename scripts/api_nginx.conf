# 小程序后端 - api.cyruszhang.online (HTTPS-only)
# 主机 Nginx 监听 443；80 端口已被博客 Docker 占用，不动
# Node 后端将监听 127.0.0.1:3000（任务 2 后启用）

server {
    listen 443 ssl http2;
    server_name api.cyruszhang.online;

    ssl_certificate     /etc/nginx/ssl/api.cyruszhang.online/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/api.cyruszhang.online/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000" always;

    access_log /var/log/nginx/api.cyruszhang.online.access.log;
    error_log  /var/log/nginx/api.cyruszhang.online.error.log warn;

    client_max_body_size 10m;

    # 健康检查（无需后端即可返回 200）
    location = /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # 默认反代到 Node 后端（任务 2 起生效；当前未启用会返回 502，正常）
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}